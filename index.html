<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<link rel="stylesheet" href="app.css">
</head>

<body class="bg-slate-900 text-white p-2">

<h1 class="text-center font-bold mb-2">🚚 Delivery PRO</h1>

<!-- INPUT -->
<textarea id="bulk" placeholder="Juan|18.50,-69.90
Pedro|18.52,-69.88"
class="w-full h-20 text-black p-2 rounded mb-2 text-sm"></textarea>

<button onclick="cargarBulk()" 
class="w-full bg-purple-500 p-2 rounded mb-2 text-sm">
📥 Cargar ubicaciones
</button>

<!-- BOTONES -->
<div class="flex gap-2 mb-2">
<button onclick="toggleFollow()" class="flex-1 bg-blue-500 p-2 rounded">📍</button>
<button onclick="toggleCompass()" class="flex-1 bg-indigo-500 p-2 rounded">🧭</button>
<button onclick="optimizarRuta()" class="flex-1 bg-green-500 p-2 rounded">⚡</button>
<button onclick="iniciarNavegacion()" class="flex-1 bg-yellow-500 p-2 rounded">🚚</button>
</div>

<div id="map"></div>
<div id="info" class="mt-2 text-sm"></div>
<script src="app.js"></script>


</body>
</html>
