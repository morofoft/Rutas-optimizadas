<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pedro Garcia | Sistema de Navegación</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="app.css">

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        // Configuración de tema Tech personalizado para Tailwind
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tech: {
                            bg: '#0a0f1e', // Fondo ultra oscuro azulado
                            pane: '#111827', // Paneles ligeramente más claros
                            neon: '#00f2fe', // Cyan neón
                            purple: '#8e44ad',
                            green: '#39ff14', // Verde neón
                            red: '#ff073a'   // Rojo neón
                        }
                    },
                    boxShadow: {
                        'neon-sm': '0 0 5px rgba(0, 242, 254, 0.5)',
                        'neon-md': '0 0 10px rgba(0, 242, 254, 0.7)',
                    }
                }
            }
        }
    </script>
    <style>
        /* Pequeño hack para asegurar que el mapa ocupe el espacio */
        body { display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; }
        #main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        
        /* Estilo Tech para SweetAlert2 */
        .swal2-popup {
            background: #111827 !important;
            color: white !important;
            border: 1px solid #00f2fe !important;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4) !important;
        }
        .swal2-title, .swal2-html-container { color: white !important; }

    /* Reset total para evitar scroll elástico en móviles */
    html, body { 
        height: 100%; 
        margin: 0; 
        padding: 0; 
        overflow: hidden; 
        position: fixed; /* Evita tirones al deslizar */
        width: 100%;
    }

    /* Contenedor principal con scroll suave */
    #main-content { 
        height: calc(100vh - 60px); /* Resta la altura del header */
        overflow-y: auto; 
        -webkit-overflow-scrolling: touch; 
    }

    /* El Mapa necesita una altura mínima obligatoria */
    #map { 
        height: 60vh; /* Se ajusta al 60% de la pantalla */
        min-height: 350px; 
        width: 100%;
    }

    /* Mejora de legibilidad en inputs móviles */
    input, textarea { font-size: 16px !important; } 

    /* Barra de navegación HUD ajustable */
    #navigation-hud {
        flex-wrap: wrap; /* Para que los botones bajen si no caben */
        gap: 8px;
    }
    </style>
</head>

<body class="bg-tech-bg text-gray-200 font-sans">

    <header class="bg-tech-pane border-b border-tech-neon/30 shadow-neon-sm p-3">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
            
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-tech-neon rounded-full animate-pulse shadow-neon-md"></div>
                <h1 class="text-xl font-bold tracking-widest text-white">
                    <span class="text-tech-neon">RM</span>_NAV<span class="text-xs text-tech-neon/70">.v3.1</span>
                </h1>
            </div>

            <nav class="flex gap-2">
                <a href="#" class="px-3 py-1.5 text-xs rounded border border-tech-neon bg-tech-neon/10 text-tech-neon shadow-neon-sm font-medium tracking-wider uppercase">
                    Mapa
                </a>
                <a href="#" class="px-3 py-1.5 text-xs rounded border border-gray-700 hover:border-tech-neon/50 hover:text-white transition-all duration-300 text-gray-400 font-medium tracking-wider uppercase">
                    Historial
                </a>
                <a href="./admin.html" class="px-3 py-1.5 text-xs rounded border border-gray-700 hover:border-tech-neon/50 hover:text-white transition-all duration-300 text-gray-400 font-medium tracking-wider uppercase">
                    Admin
                </a>
            </nav>
        </div>
    </header>

    <main id="main-content" class="p-3 md:p-5 space-y-4">

        <section class="bg-tech-pane p-4 rounded-lg border border-gray-800 shadow-lg">
            <h2 class="text-sm font-semibold text-gray-400 mb-3 tracking-wider uppercase">Panel de Carga Masiva</h2>
            
            <textarea id="bulk" placeholder="Formato: Nombre|Lat,Lng (Ej: Juan|18.50,-69.90)"
                class="w-full h-24 bg-gray-900 text-tech-neon p-3 rounded border border-gray-700 focus:border-tech-neon focus:ring-1 focus:ring-tech-neon transition-all outline-none mb-3 text-sm font-mono placeholder:text-gray-600"></textarea>

            <button onclick="cargarBulk()" 
                class="w-full flex items-center justify-center gap-2 bg-transparent border-2 border-purple-500 text-purple-400 hover:bg-purple-500 hover:text-white p-2.5 rounded-lg text-sm font-bold transition-all duration-300 active:scale-95 shadow-lg shadow-purple-500/20">
                <span class="text-base">📥</span> INYECTAR DATOS (.sys)
            </button>
        </section>

        <section class="relative bg-tech-pane rounded-lg border border-tech-neon/20 shadow-neon-sm mx-1">
    
            <div class="absolute top-2 right-2 z-[1000] flex flex-col gap-2">
                <button onclick="toggleFollow()" class="bg-gray-900/90 backdrop-blur-md text-blue-400 border border-blue-500/50 p-4 rounded-full shadow-lg active:scale-90">
                    📍
                </button>
                <button onclick="toggleCompass()" class="bg-gray-900/90 backdrop-blur-md text-indigo-400 border border-indigo-500/50 p-4 rounded-full shadow-lg active:scale-90">
                    🧭
                </button>
            </div>
        
            <div id="map" class="z-10"></div>
        
            <div id="navigation-hud" class="p-4 bg-gray-900 flex flex-col sm:flex-row items-center justify-between gap-3 border-t border-gray-800">
                <div id="info" class="text-xs font-mono text-tech-green animate-pulse text-center sm:text-left leading-relaxed">
                    > SISTEMA_READY_
                </div>
                <div class="flex w-full sm:w-auto gap-2">
                    <button onclick="optimizarRuta()" class="flex-1 sm:flex-none bg-tech-green/10 text-tech-green border border-tech-green/50 py-3 px-4 rounded font-bold text-[10px] uppercase tracking-tighter">
                        ⚡ RUTA
                    </button>
                    <button onclick="iniciarNavegacion()" class="flex-1 sm:flex-none bg-yellow-500/10 text-yellow-400 border border-yellow-500/50 py-3 px-4 rounded font-bold text-[10px] uppercase tracking-tighter">
                        🚚 GO
                    </button>
                    <button onclick="abrirSelector()" 
class="flex-1 bg-purple-500/10 text-purple-400 border border-purple-500/50 py-3 px-4 rounded font-bold text-[10px] uppercase">
📋 PUNTOS
</button>
                </div>
            </div>
        </section>

    </main>

    <script src="app.js"></script>

</body>
</html>
