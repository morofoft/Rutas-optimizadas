<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RM - Sistema de Navegación</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="app.css">

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        // Configuración de tema Tech personalizado para Tailwind
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tech: {
                            bg: '#0a0f1e', // Fondo ultra oscuro azulado
                            pane: '#111827', // Paneles ligeramente más claros
                            neon: '#00f2fe', // Cyan neón
                            purple: '#8e44ad',
                            green: '#39ff14', // Verde neón
                            red: '#ff073a'   // Rojo neón
                        }
                    },
                    boxShadow: {
                        'neon-sm': '0 0 5px rgba(0, 242, 254, 0.5)',
                        'neon-md': '0 0 10px rgba(0, 242, 254, 0.7)',
                    }
                }
            }
        }
    </script>
    <style>
        /* Pequeño hack para asegurar que el mapa ocupe el espacio */
        body { display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; }
        #main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        
        /* Estilo Tech para SweetAlert2 */
        .swal2-popup {
            background: #111827 !important;
            color: white !important;
            border: 1px solid #00f2fe !important;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4) !important;
        }
        .swal2-title, .swal2-html-container { color: white !important; }
    </style>
</head>

<body class="bg-tech-bg text-gray-200 font-sans">

    <header class="bg-tech-pane border-b border-tech-neon/30 shadow-neon-sm p-3">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
            
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-tech-neon rounded-full animate-pulse shadow-neon-md"></div>
                <h1 class="text-xl font-bold tracking-widest text-white">
                    <span class="text-tech-neon">RM</span>_NAV<span class="text-xs text-tech-neon/70">.v1</span>
                </h1>
            </div>

            <nav class="flex gap-2">
                <a href="./index.html" class="px-3 py-1.5 text-xs rounded border border-gray-700 hover:border-tech-neon/50 hover:text-white transition-all duration-300 text-gray-400 font-medium tracking-wider uppercase">
                    Mapa
                </a>
                <a href="#" class="px-3 py-1.5 text-xs rounded border border-gray-700 hover:border-tech-neon/50 hover:text-white transition-all duration-300 text-gray-400 font-medium tracking-wider uppercase">
                    Historial
                </a>
                <a href="#" class="px-3 py-1.5 text-xs rounded border border-tech-neon bg-tech-neon/10 text-tech-neon shadow-neon-sm font-medium tracking-wider uppercase">
                    Admin
                </a>
            </nav>
        </div>
    </header>

    <main id="main-content" class="p-3 md:p-5 space-y-4">

        

        
    </main>

    <script src="app.js"></script>

</body>
</html>
